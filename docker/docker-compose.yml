# =============================================================================
# CONCEPT: This docker-compose brings up the full development environment.
# Keycloak ALWAYS needs a database in production (never use H2 in prod).
# PostgreSQL is the recommended DB for Keycloak for performance and support.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL – Keycloak database
  # Keycloak stores here: realms, clients, users, sessions, events
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: altana-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_dev_pass   # development only – use secrets in prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - altana-net

  # ---------------------------------------------------------------------------
  # KEYCLOAK 26.5.6 – Identity Provider
  #
  # CONCEPT: Keycloak exposes several important endpoints:
  #   - /realms/{realm}/.well-known/openid-configuration  → Discovery document
  #   - /realms/{realm}/protocol/openid-connect/auth      → Authorization endpoint
  #   - /realms/{realm}/protocol/openid-connect/token     → Token endpoint
  #   - /realms/{realm}/protocol/openid-connect/certs     → JWKS (public keys)
  #   - /realms/{realm}/protocol/openid-connect/userinfo  → UserInfo endpoint
  #   - /admin/realms                                      → Admin REST API
  #
  # INTERVIEW: What is the Discovery Document?
  #   → A standard OIDC endpoint that describes all available endpoints,
  #     supported algorithms, scopes, etc. Clients use it to auto-configure
  #     themselves without hardcoding URLs.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: altana-keycloak
    command: start-dev --import-realm
    environment:
      # Admin credentials – NEVER use these in production
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev_pass

      # General configuration
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: true
      KC_LOG_LEVEL: INFO

      # Health checks enabled
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    volumes:
      # Import realm on startup (useful for reproducible dev environments)
      - ./keycloak/realms:/opt/keycloak/data/import
      # Custom themes (for UC2)
      - ./keycloak/themes:/opt/keycloak/themes
      # SPI Extensions: JARs in this folder are loaded automatically.
      # CONCEPT: Keycloak uses java.util.ServiceLoader to discover providers
      # in /opt/keycloak/providers/ when starting with start-dev.
      - ./keycloak/providers:/opt/keycloak/providers
    ports:
      - "8080:8080"
      - "9000:9000"   # Management port (health/metrics)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - altana-net

  # ---------------------------------------------------------------------------
  # MAILHOG – Fake email server for development
  # Keycloak sends emails for: verification, password reset, OTP
  # CONCEPT: In production, configure a real SMTP server. MailHog captures emails locally.
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: altana-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - altana-net

volumes:
  postgres_data:
    name: altana-postgres-data

networks:
  altana-net:
    name: altana-network
    driver: bridge
