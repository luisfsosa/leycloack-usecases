# =============================================================================
# CONCEPTO: Este docker-compose levanta el ambiente de desarrollo completo.
# Keycloak SIEMPRE necesita una base de datos en producción (no usar H2 en prod).
# PostgreSQL es la DB recomendada para Keycloak por performance y soporte.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL – Base de datos de Keycloak
  # Keycloak almacena aquí: realms, clients, users, sessions, events
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: altana-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_dev_pass   # SOLO desarrollo – usar secrets en prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - altana-net

  # ---------------------------------------------------------------------------
  # KEYCLOAK 26.5.6 – Identity Provider
  #
  # CONCEPTO: Keycloak expone varios endpoints importantes:
  #   - /realms/{realm}/.well-known/openid-configuration  → Discovery document
  #   - /realms/{realm}/protocol/openid-connect/auth      → Authorization endpoint
  #   - /realms/{realm}/protocol/openid-connect/token     → Token endpoint
  #   - /realms/{realm}/protocol/openid-connect/certs     → JWKS (public keys)
  #   - /realms/{realm}/protocol/openid-connect/userinfo  → UserInfo endpoint
  #   - /admin/realms                                      → Admin REST API
  #
  # ENTREVISTA: ¿Qué es el Discovery Document?
  #   → Endpoint estándar OIDC que describe todos los endpoints disponibles,
  #     algoritmos soportados, scopes, etc. Los clientes lo usan para
  #     auto-configurarse sin hardcodear URLs.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: altana-keycloak
    command: start-dev --import-realm
    environment:
      # Admin credentials – NUNCA usar estos en producción
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      # Base de datos
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev_pass

      # Configuración general
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: true
      KC_LOG_LEVEL: INFO

      # Health checks habilitados
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    volumes:
      # Importar realm al iniciar (útil para dev reproducible)
      - ./keycloak/realms:/opt/keycloak/data/import
      # Themes personalizados (para UC2)
      - ./keycloak/themes:/opt/keycloak/themes
    ports:
      - "8080:8080"
      - "9000:9000"   # Management port (health/metrics)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - altana-net

  # ---------------------------------------------------------------------------
  # MAILHOG – Servidor de email fake para desarrollo
  # Keycloak envía emails para: verificación, reset password, OTP
  # CONCEPTO: En producción configurar SMTP real. MailHog captura emails localmente.
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: altana-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - altana-net

volumes:
  postgres_data:
    name: altana-postgres-data

networks:
  altana-net:
    name: altana-network
    driver: bridge
