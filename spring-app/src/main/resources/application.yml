server:
  port: 8081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri does two things:
          # 1. Downloads public keys via JWKS (to verify RS256 signatures)
          # 2. Validates that the token 'iss' claim matches this URI
          issuer-uri: http://localhost:8080/realms/altana-dev
